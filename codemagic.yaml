workflows:
  ios-clean-build:
    name: iOS Clean Build
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Run recreate iOS script
        script: |
          chmod +x scripts/recreate_ios.sh
          ./scripts/recreate_ios.sh
      - name: Build IPA
        script: |
          cd flutter_app
          flutter build ipa --release
    artifacts:
      - flutter_app/build/ios/ipa/*.ipa
