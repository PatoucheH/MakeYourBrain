workflows:
  ios-clean-build:
    name: iOS Clean Build
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    cache:
      cache_paths:
        - $HOME/.pub-cache
    integrations:
      app_store_connect: Codemagic
    scripts:
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files com.patou.makeyourbrain --type IOS_APP_STORE --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Flutter pub get
        script: |
          cd flutter_app
          flutter pub get
      - name: Clean and install pods (no cache)
        script: |
          cd flutter_app/ios
          rm -rf Pods Podfile.lock
          pod repo update
          pod install
      - name: Build IPA
        script: |
          cd flutter_app
          flutter build ipa --release --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - flutter_app/build/ios/ipa/*.ipa
