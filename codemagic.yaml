workflows:
  ios-clean-build:
    name: iOS Clean Build
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    integrations:
      app_store_connect: Codemagic
    scripts:
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files com.patou.makeyourbrain --type IOS_APP_STORE --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Run recreate iOS script
        script: |
          chmod +x scripts/recreate_ios.sh
          ./scripts/recreate_ios.sh
      - name: Build IPA
        script: |
          cd flutter_app
          flutter build ipa --release --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - flutter_app/build/ios/ipa/*.ipa
