name: flutter_app
description: "A new Flutter project."
publish_to: 'none' 
version: 1.0.17+18

environment:
  sdk: ">=3.3.0 <4.0.0"
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.12.0
  provider: ^6.1.5+1
  flutter_localizations:
    sdk: flutter
  intl: any
  google_sign_in: ^6.0.0
  sign_in_with_apple: ^7.0.0
  url_launcher: ^6.3.2
  http: ^1.2.0
  path_provider: ^2.0.0
  google_mobile_ads: ^7.0.0
  firebase_core: ^4.5.0
  firebase_messaging: ^16.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.0
flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/branding/logo/
    - assets/branding/mascot/

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/branding/logo/brainly_logo.png"
  android_background_color: "#6A1B9A"

dependency_overrides:
  shared_preferences: ^2.3.0
  shared_preferences_foundation:
    path: packages/shared_preferences_foundation